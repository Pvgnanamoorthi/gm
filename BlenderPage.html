<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blender Assets Portfolio</title>
  <style>
    /* Reset & Font */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      min-height: 100vh;
      color: white;
      padding: 20px;
      /* Remove background image from body, handled by ::before */
      background: none;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: url(backpic.jpeg) no-repeat center center fixed;
      background-size: cover;
      opacity: 0.9; /* Slightly reduce opacity for dimming */
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      background-color: rgba(0, 0, 0, 0.6);
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      font-size: 2.5rem;
      color: #ffcc00;
    }

    h2 {
      margin: 15px 0;
      color: #00e6e6;
    }

    .section {
      margin-bottom: 40px;
    }

    .assets-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .asset-card {
      background-color: rgba(0, 0, 0, 0.7);
      border-radius: 12px;
      overflow: hidden;
      width: 250px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      text-align: center;
      transition: transform 0.3s;
    }

    .asset-card:hover {
      transform: scale(1.05);
    }

    .asset-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .asset-card p {
      padding: 10px;
    }

    .download-btn {
      display: inline-block;
      background-color: #ffcc00;
      color: black;
      padding: 10px 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }

    .download-btn:hover {
      background-color: #ffaa00;
    }

    @media (max-width: 768px) {
      .assets-container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>My Blender Assets</h1>
    <p>Download my 3D creations categorized by skill level</p>
  </header>

  <section class="section">
    <h2>Featured Assets</h2>
    <div class="assets-container" style="justify-content: center; gap: 40px; flex-wrap: wrap;">

      <!-- Asset/Project 1 -->
      <div class="asset-card" style="max-width:370px; margin: 0 12px; position: relative;">
  
        <img src="coverpic_blend.png" alt="Featured Blender Asset" />
        <p>Basic Chair Model</p>
      
        <div style="display: flex; justify-content: center; gap: 12px; align-items: center;">
          
          <button class="download-btn" id="downloadDropdownBtn1" style="min-width: 120px;">
            Download <span style="margin-left: 6px;">▼</span>
          </button>
      
          <a class="download-btn" href="coverpic_blend.png" target="_blank"
             style="background-color: #e0e0e0; color: #222; min-width: 120px;">
            Preview
          </a>
      
        </div>
      
        <!-- Dropdown Menu -->
        <div id="downloadDropdownMenu1"
             style="display:none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
                    min-width: 140px; background: #fff; border-radius: 7px; margin-top:8px;
                    box-shadow: 0 6px 24px rgba(0,0,0,0.19); text-align:left; z-index:30;">
      
          <a href="BasicChair.blend" download
             style="display:block; padding:12px 16px; color:#222; text-decoration:none; border-bottom:1px solid #eee;">
             Download .blend
          </a>
      
          <a href="BasicChair.fbx" download
             style="display:block; padding:12px 16px; color:#222; text-decoration:none; border-bottom:1px solid #eee;">
             Download .fbx
          </a>
      
          <a href="BasicChair.obj" download
             style="display:block; padding:12px 16px; color:#222; text-decoration:none;">
             Download .obj
          </a>
      
        </div>
      
      </div>
      
      <!-- JavaScript -->
      <script>
        const btn = document.getElementById("downloadDropdownBtn1");
        const menu = document.getElementById("downloadDropdownMenu1");
      
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          menu.style.display = menu.style.display === "block" ? "none" : "block";
        });
      
        document.addEventListener("click", function () {
          menu.style.display = "none";
        });
      </script>
      

      <!-- Asset/Project 2 -->
      <div class="asset-card" style="max-width:370px; margin: 0 12px;">
        <img src="table_render.png" alt="Table Blender Asset" />
        <p>Simple Wooden Table Model</p>
        <div style="display: flex; justify-content: center; gap: 12px; align-items: center;">
          <button class="download-btn" id="downloadDropdownBtn2" style="position: relative; min-width: 120px;">
            Download
            <span style="margin-left: 6px; font-size: 1em;">▼</span>
          </button>
          <a class="download-btn" href="table_render.png" target="_blank" style="background-color: #e0e0e0; color: #222; min-width: 120px;">Preview</a>
        </div>
        <div id="downloadDropdownMenu2" style="display:none; position: absolute; z-index:30; left:50%; transform:translateX(-50%); min-width: 140px; background: #fff; border-radius: 7px; margin-top:5px; box-shadow: 0 6px 24px rgba(0,0,0,0.19); text-align:left;">
          <a href="building.blend1" download class="download-option" style="display:block; padding:12px 16px; color:#222; text-decoration:none; border-bottom:1px solid #eee;">Download .blend</a>
          <a href="building.fbx" download class="download-option" style="display:block; padding:12px 16px; color:#222; text-decoration:none; border-bottom:1px solid #eee;">Download .fbx</a>
          <a href="building.obj" download class="download-option" style="display:block; padding:12px 16px; color:#222; text-decoration:none;">Download .obj</a>
        </div>
      </div>

      <!-- Add more asset/project cards as needed in future -->
    </div>
  </section>

  

  <script>
    // Dropdown logic for download button
    const dropdownBtn = document.getElementById('downloadDropdownBtn');
    const dropdownMenu = document.getElementById('downloadDropdownMenu');

    dropdownBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      dropdownMenu.style.display = (dropdownMenu.style.display === "block" ? "none" : "block");
    });

    document.addEventListener('click', function () {
      dropdownMenu.style.display = "none";
    });

    // Prevent closing dropdown when clicking a download option
    Array.from(dropdownMenu.getElementsByTagName('a')).forEach(function (el) {
      el.addEventListener('click', function (e) {
        dropdownMenu.style.display = "none";
      })
    });
  </script>

</body>
</html>
